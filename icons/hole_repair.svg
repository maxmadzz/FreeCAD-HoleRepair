<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 背景 -->
  <rect x="2" y="2" width="60" height="60" rx="8" fill="#2196F3" opacity="0.1"/>
  
  <!-- 网格线（表示 Mesh） -->
  <g stroke="#90CAF9" stroke-width="0.5" opacity="0.3">
    <line x1="10" y1="10" x2="54" y2="10"/>
    <line x1="10" y1="20" x2="54" y2="20"/>
    <line x1="10" y1="30" x2="54" y2="30"/>
    <line x1="10" y1="40" x2="54" y2="40"/>
    <line x1="10" y1="50" x2="54" y2="50"/>
    <line x1="10" y1="10" x2="10" y2="50"/>
    <line x1="20" y1="10" x2="20" y2="50"/>
    <line x1="30" y1="10" x2="30" y2="50"/>
    <line x1="40" y1="10" x2="40" y2="50"/>
    <line x1="50" y1="10" x2="50" y2="50"/>
  </g>
  
  <!-- 孔洞（圆形缺口） -->
  <circle cx="32" cy="30" r="12" fill="white" stroke="#F44336" stroke-width="2" stroke-dasharray="4,2"/>
  
  <!-- 圆弧检测线 -->
  <circle cx="32" cy="30" r="12" fill="none" stroke="#4CAF50" stroke-width="2.5"/>
  
  <!-- 圆心标记 -->
  <circle cx="32" cy="30" r="2" fill="#4CAF50"/>
  <line x1="32" y1="25" x2="32" y2="35" stroke="#4CAF50" stroke-width="1"/>
  <line x1="27" y1="30" x2="37" y2="30" stroke="#4CAF50" stroke-width="1"/>
  
  <!-- 半径线 -->
  <line x1="32" y1="30" x2="44" y2="30" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="38" y="28" font-size="6" fill="#FF9800">r</text>
  
  <!-- 重建箭头 -->
  <path d="M 15 45 L 25 35 L 35 45" fill="none" stroke="#2196F3" stroke-width="2"/>
  <polygon points="35,45 32,42 38,42" fill="#2196F3"/>
  
  <!-- 文字标签 -->
  <text x="32" y="58" text-anchor="middle" font-size="7" fill="#333" font-weight="bold">孔洞修复</text>
</svg>
